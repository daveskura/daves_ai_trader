name: Daily trading run

on:
  schedule:
    # 21:30 UTC = 4:30 PM EST (winter) / 5:30 PM EDT (summer) — post-market-close.
    # Note: GitHub Actions cron is always UTC; no automatic DST adjustment.
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run KPI analyser
        run: python equity_kpi_analyzer.py --universe
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Run strategy runner
        run: python strategy_runner.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit results back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # universe_cache.json is included so the weekly refresh survives
          # across CI runs and Yahoo Finance isn't hammered every day.
          git add leaderboard.csv account_*.csv holdings_*.csv transactions_*.csv equity_kpi_results.csv universe_cache.json || true
          git diff --staged --quiet || git commit -m "Daily trading run - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily trading run FAILED at $(date -u '+%Y-%m-%d %H:%M UTC'). Check the logs above."
          # To enable Slack/email alerts, add a secrets.SLACK_WEBHOOK and
          # replace this step with the slackapi/slack-github-action action.
