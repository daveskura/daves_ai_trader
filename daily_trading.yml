name: Daily trading run

on:
  schedule:
    # ── Stage 1: Pre-market news run ──────────────────────────────────────────
    # 11:30 UTC = 6:30 AM EST (winter) / 7:30 AM EDT (summer)
    # Runs strategies 19 & 20 only on fresh overnight + pre-market headlines,
    # BEFORE the US market opens and prices in the news.
    # Note: GitHub Actions cron is always UTC; no automatic DST adjustment.
    - cron: '30 11 * * 2-6'

    # ── Stage 2: Post-market full run ─────────────────────────────────────────
    # 21:30 UTC = 4:30 PM EST (winter) / 5:30 PM EDT (summer)
    # Runs all 20 strategies on settled closing prices + refreshed KPIs.
    # The news cache from Stage 1 is reused here — no duplicate Claude call.
    - cron: '30 21 * * 1-5'

  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Which strategies to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - news-only
          - kpi-only

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Detect which stage we are in ────────────────────────────────────────
      # Pre-market job (Stage 1): runs at 11:30 UTC, hour=11
      # Post-market job (Stage 2): runs at 21:30 UTC, hour=21
      # Manual dispatch: uses run_mode input (defaults to 'all')
      - name: Detect run stage
        id: stage
        run: |
          HOUR=$(date -u +%H)
          MODE="${{ github.event.inputs.run_mode }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$MODE" ]; then
            echo "mode=$MODE" >> $GITHUB_OUTPUT
            echo "Run mode (manual): $MODE"
          elif [ "$HOUR" -lt "15" ]; then
            echo "mode=news-only" >> $GITHUB_OUTPUT
            echo "Run mode (auto): news-only  (pre-market stage 1)"
          else
            echo "mode=all" >> $GITHUB_OUTPUT
            echo "Run mode (auto): all  (post-market stage 2)"
          fi

      # ── Stage 1 & 2: KPI analyser ───────────────────────────────────────────
      # Skipped in news-only mode — strategies 19/20 reuse prior-day KPI data
      # (RSI and MAs don't change meaningfully overnight).
      - name: Run KPI analyser
        if: steps.stage.outputs.mode != 'news-only'
        run: python equity_kpi_analyzer.py --universe
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      # ── Stage 1: News-only runner (strategies 19 & 20 only) ─────────────────
      - name: Run news strategies (pre-market)
        if: steps.stage.outputs.mode == 'news-only'
        run: |
          python strategy_runner.py --strategy 19
          python strategy_runner.py --strategy 20
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ── Stage 2: Full runner (all 20 strategies) ─────────────────────────────
      - name: Run all strategies (post-market)
        if: steps.stage.outputs.mode == 'all'
        run: python strategy_runner.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ── Commit results back to repo ──────────────────────────────────────────
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # news_macro_cache.json persists the Stage 1 analysis so Stage 2
          # reuses it without a duplicate Claude API call.
          # universe_cache.json persists the weekly S&P 500 constituent list.
          git add leaderboard.csv account_*.csv holdings_*.csv transactions_*.csv \
                  equity_kpi_results.csv universe_cache.json news_macro_cache.json || true
          git diff --staged --quiet || git commit -m "Trading run [$(date -u '+%H:%M UTC')] - $(date -u '+%Y-%m-%d')"
          git push

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Trading run FAILED at $(date -u '+%Y-%m-%d %H:%M UTC'). Check the logs above."
          # To enable Slack/email alerts, add a secrets.SLACK_WEBHOOK and
          # replace this step with the slackapi/slack-github-action action.
