name: Daily trading run

on:
  schedule:
    # 4:30 PM ET = 21:30 UTC (accounts for EST, adjust to 20:30 for EDT in summer)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    # allows manual trigger from GitHub Actions tab

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install yfinance pandas fredapi ta requests lxml

      - name: Run KPI analyser
        run: python equity_kpi_analyzer.py --universe
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Run strategy runner
        run: python strategy_runner.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit results back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard.csv account_*.csv holdings_*.csv transactions_*.csv equity_kpi_results.csv || true
          git diff --staged --quiet || git commit -m "Daily trading run - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
